<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#050506" />
    <title>Unsubscribe · UPlate</title>
    <meta name="description" content="Unsubscribe from UPlate emails." />
    <meta name="robots" content="noindex" />
    <link rel="canonical" href="https://u-plate.com/unsubscribe" />
    <link rel="shortcut icon" href="./assets/logo/logo.png" type="image/x-icon" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" />

    <style>
        :root {
            color-scheme: dark;
            --bg: #050506;
            --bg-rgb: 5, 5, 6;
            --ink: #e8e5e0;
            --ink-rgb: 232, 229, 224;
            --ink-soft: #a3a3a0;
            --ink-muted: #757572;
            --accent: #0A8DD3;
            --accent-rgb: 10, 141, 211;
            --accent-soft: rgba(10, 141, 211, 0.12);
            --hairline: rgba(232, 229, 224, 0.10);
            --hairline-strong: rgba(232, 229, 224, 0.16);
            --danger: #d06a5c;
            --success: #5fb98a;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.3);
            --shadow-lg: 0 40px 80px -40px rgba(0, 0, 0, 0.8);
            --radius-md: 14px;
            --radius-lg: 22px;
            --font-sans: "Schibsted Grotesk", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            --font-display: var(--font-sans);
            font-family: var(--font-sans);
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
        }

        * { box-sizing: border-box; }

        html, body { margin: 0; padding: 0; }

        html { min-height: 100%; background: var(--bg); }

        body {
            min-height: 100vh;
            background: var(--bg);
            color: var(--ink);
            font-size: 16px;
            line-height: 1.5;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px 18px;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background:
                linear-gradient(rgba(var(--ink-rgb), 0.028) 1px, transparent 1px),
                linear-gradient(90deg, rgba(var(--ink-rgb), 0.022) 1px, transparent 1px);
            background-size: 72px 72px;
            opacity: 0.34;
            pointer-events: none;
        }

        button, a, input { -webkit-tap-highlight-color: transparent; }
        a { color: inherit; }

        .shell {
            width: 100%;
            max-width: 440px;
            margin: 0 auto;
        }

        /* ============ Card surface (glass moment) ============ */
        .card {
            position: relative;
            width: 100%;
            padding: 36px 32px 28px;
            background: rgba(var(--ink-rgb), 0.03);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border: 1px solid var(--hairline-strong);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            isolation: isolate;
            text-align: center;
        }

        .card::before {
            content: "";
            position: absolute;
            inset: 0;
            background: radial-gradient(80% 50% at 50% 0%, rgba(var(--accent-rgb), 0.08), transparent 70%);
            pointer-events: none;
            z-index: -1;
        }

        /* ============ Brand header ============ */
        .brand-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .brand-mark {
            display: grid;
            place-items: center;
            flex: 0 0 auto;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background-color: #ffffff;
            background-image: url("https://i.postimg.cc/MGw9xFRg/UPlate(1).png");
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            box-shadow: inset 0 0 0 1px var(--hairline-strong), var(--shadow-sm);
        }

        .brand-text {
            display: flex;
            flex-direction: column;
            line-height: 1;
            text-align: left;
        }

        .brand-name {
            margin: 0;
            color: var(--ink);
            font-size: 16px;
            font-weight: 600;
            letter-spacing: -0.01em;
        }

        .brand-line {
            margin: 4px 0 0;
            color: var(--ink-muted);
            font-size: 12px;
            font-weight: 400;
            letter-spacing: 0.02em;
        }

        /* ============ Heading block ============ */
        .eyebrow {
            display: inline-flex;
            align-items: center;
            margin: 28px 0 0;
            padding: 6px 12px;
            border-radius: 999px;
            background: var(--accent-soft);
            color: var(--accent);
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.14em;
            text-transform: uppercase;
        }

        .title {
            margin: 24px 0 0;
            color: var(--ink);
            font-family: var(--font-display);
            font-size: clamp(28px, 7vw, 34px);
            font-weight: 500;
            line-height: 1.05;
            letter-spacing: -0.02em;
        }

        .lede {
            margin: 10px auto 0;
            max-width: 34ch;
            color: var(--ink-soft);
            font-size: 15px;
            line-height: 1.5;
        }

        /* ============ Form ============ */
        .form {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 24px;
            text-align: left;
        }

        .field-label {
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.02em;
            color: var(--ink-soft);
            margin-left: 2px;
        }

        .input {
            width: 100%;
            min-height: 52px;
            padding: 0 2px;
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--hairline-strong);
            border-radius: 0;
            color: var(--ink);
            font-family: var(--font-sans);
            font-size: 15px;
            font-weight: 400;
            transition: border-color 0.18s ease;
        }

        .input::placeholder { color: var(--ink-muted); }

        .input:hover {
            border-bottom-color: rgba(var(--ink-rgb), 0.3);
        }

        .input:focus {
            outline: none;
            border-bottom-color: var(--ink);
        }

        .submit {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            min-height: 54px;
            margin-top: 14px;
            padding: 0 18px;
            border: none;
            border-radius: 999px;
            background: linear-gradient(180deg, #1499dd, #0a7fc0);
            color: #ffffff;
            font-family: var(--font-sans);
            font-size: 15px;
            font-weight: 500;
            letter-spacing: 0.01em;
            cursor: pointer;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.25), 0 4px 18px rgba(var(--accent-rgb), 0.25);
            transition: transform 0.18s ease, filter 0.18s ease, box-shadow 0.18s ease;
        }

        .submit:hover:not(:disabled) {
            filter: brightness(1.08);
            transform: translateY(-1px);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.25), 0 8px 26px rgba(var(--accent-rgb), 0.35);
        }

        .submit:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 3px;
        }

        .submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .message {
            margin: 14px 0 0;
            font-size: 14px;
            font-weight: 500;
            line-height: 1.45;
        }

        .message--error { color: var(--danger); }
        .message--success { color: var(--success); }
        .is-hidden { display: none !important; }

        /* ============ Success state ============ */
        .success-block { margin-top: 24px; }

        .success-icon {
            display: grid;
            place-items: center;
            width: 64px;
            height: 64px;
            margin: 0 auto;
            border-radius: 50%;
            background: linear-gradient(180deg, #1499dd, #0a7fc0);
            color: #ffffff;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.25), 0 8px 20px -8px rgba(var(--accent-rgb), 0.5);
        }

        .success-icon svg { width: 28px; height: 28px; }

        .success-title {
            margin: 18px 0 0;
            font-family: var(--font-display);
            font-size: 24px;
            font-weight: 500;
            letter-spacing: -0.02em;
        }

        .success-text {
            margin: 8px auto 0;
            max-width: 32ch;
            color: var(--ink-soft);
            font-size: 15px;
        }

        /* ============ Footer ============ */
        .card-footer {
            margin-top: 28px;
            padding-top: 18px;
            border-top: 1px solid var(--hairline);
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: var(--ink-muted);
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.14em;
            text-transform: uppercase;
        }

        .card-footer a {
            text-decoration: none;
            transition: color 0.18s ease;
        }

        .card-footer a:hover { color: var(--ink); }

        @media (min-width: 680px) {
            body { padding: 56px 24px; }
            .card { padding: 44px 40px 32px; }
        }
    </style>
</head>

<body>
    <main class="shell">
        <div class="card">
            <header class="brand-header">
                <span class="brand-mark" aria-hidden="true"></span>
                <div class="brand-text">
                    <p class="brand-name">UPlate</p>
                    <p class="brand-line">Your University Meal Prep Buddy</p>
                </div>
            </header>

            <!-- Form state -->
            <div id="unsubscribe-view">

                <h1 class="title">Unsubscribe from emails</h1>
                <p class="lede">
                    Enter the email address you'd like to remove. You'll stop receiving
                    UPlate updates and newsletters.
                </p>

                <form id="unsubscribe-form" class="form" novalidate>
                    <label class="field-label" for="unsubscribe-email">Email address</label>
                    <input id="unsubscribe-email" class="input" type="email" name="email"
                        placeholder="you@school.edu" autocomplete="email" required />

                    <p id="unsubscribe-error" class="message message--error is-hidden" role="alert"></p>

                    <button id="unsubscribe-submit" class="submit" type="submit">
                        Unsubscribe
                    </button>
                </form>
            </div>

            <!-- Success state -->
            <div id="unsubscribe-success" class="success-block is-hidden">
                <div class="success-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 6 9 17l-5-5" />
                    </svg>
                </div>
                <h2 class="success-title">You're unsubscribed</h2>
                <p class="success-text">
                    <span id="success-email">This address</span> won't receive UPlate emails
                    anymore.
                </p>
            </div>

            <footer class="card-footer">
                <span>UPlate</span>
                <a href="/">u-plate.com</a>
            </footer>
        </div>
    </main>

    <script type="module">
        const form = document.getElementById('unsubscribe-form');
        const emailInput = document.getElementById('unsubscribe-email');
        const errorEl = document.getElementById('unsubscribe-error');
        const submitBtn = document.getElementById('unsubscribe-submit');
        const formView = document.getElementById('unsubscribe-view');
        const successView = document.getElementById('unsubscribe-success');
        const successEmail = document.getElementById('success-email');

        // Unsubscribe endpoint: GET|POST /:school/email/unsubscribe?email=<addr>
        const API_BASE = 'https://boilerbites.com';

        function isValidEmail(email) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }

        function slugify(value) {
            return value.toLowerCase().trim().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '');
        }

        function showError(msg) {
            errorEl.textContent = msg;
            errorEl.classList.remove('is-hidden');
        }

        const params = new URLSearchParams(window.location.search);

        // Resolve the school slug: ?school= query param, then stored university, else default.
        const storedUni = localStorage.getItem('uplate_university') || '';
        const school = slugify(params.get('school') || storedUni || 'purdue') || 'purdue';

        // Prefill from ?email= query param (links in emails often include it)
        const prefill = params.get('email');
        if (prefill) emailInput.value = prefill;

        emailInput.addEventListener('input', () => errorEl.classList.add('is-hidden'));

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = emailInput.value.trim();

            if (!email) {
                showError('Please enter your email address.');
                return;
            }
            if (!isValidEmail(email)) {
                showError('Please enter a valid email address.');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Unsubscribing…';

            try {
                // GET|POST /:school/email/unsubscribe?email=<addr>
                // no-cors mirrors how the waitlist endpoint is called on the main site
                const url = `${API_BASE}/${encodeURIComponent(school)}/email/unsubscribe?email=${encodeURIComponent(email)}`;
                await fetch(url, {
                    method: 'POST',
                    mode: 'no-cors',
                });

                // Local backup of the request
                const existing = JSON.parse(localStorage.getItem('uplate_unsubscribes') || '[]');
                existing.push({ email, timestamp: new Date().toISOString() });
                localStorage.setItem('uplate_unsubscribes', JSON.stringify(existing));

                successEmail.textContent = email;
                formView.classList.add('is-hidden');
                successView.classList.remove('is-hidden');
            } catch (err) {
                console.error('Unsubscribe error:', err);
                submitBtn.disabled = false;
                submitBtn.textContent = 'Unsubscribe';
                showError("Something went wrong. Please try again or email contact@u-plate.com.");
            }
        });
    </script>
</body>

</html>
